repos:
  # Use system-installed tools instead of fetching remote revisions. This
  # avoids failures in environments where pre-commit can't fetch specific
  # remote tags or where network access is restricted.
  - repo: local
    hooks:
      - id: black
        name: black (system)
        entry: black
        language: system
        types: [python]

      - id: ruff
        name: ruff (system)
        entry: ruff check
        language: system
        types: [python]

      - id: isort
        name: isort (system)
        entry: isort
        language: system
        types: [python]
