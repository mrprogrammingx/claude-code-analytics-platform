name: CI

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run pre-commit hooks
        run: |
          if command -v pre-commit >/dev/null 2>&1; then
            pre-commit run --all-files
          else
            echo "pre-commit not installed; skipping"
          fi

      - name: Run linters (ruff)
        run: |
          ruff check .

      - name: Check formatting (black)
        run: |
          black --check .

      - name: Run tests
        run: |
          pytest -q

      - name: Execute predictive notebook
        run: |
          python -m pip install nbconvert
          jupyter nbconvert --to notebook --execute notebooks/predictive_example.ipynb --ExecutePreprocessor.timeout=120 --output notebooks/predictive_example-executed.ipynb

      - name: Upload executed notebook
        uses: actions/upload-artifact@v4
        with:
          name: executed-notebook
          path: notebooks/predictive_example-executed.ipynb
