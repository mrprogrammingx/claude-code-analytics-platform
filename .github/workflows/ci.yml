name: CI

# Opt into Node.js 24 for actions that still run on Node 20 (prevents deprecation warnings)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: "Debug: python and packages"
        run: |
          python --version
          python -m pip --version
          python -m pip list --format=columns

      - name: Ensure pre-commit installed
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit

      - name: Run pre-commit hooks
        run: |
          if command -v pre-commit >/dev/null 2>&1; then
            pre-commit run --all-files
          else
            echo "pre-commit not installed; skipping"
          fi

      - name: Run linters (ruff)
        run: |
          ruff check .

      - name: Check formatting (black)
        run: |
          black --check .

      - name: Run tests
        run: |
          pytest -q

      - name: Execute predictive notebook
        run: |
          python -m pip install nbconvert ipykernel
          # register a kernel named 'python3' so nbconvert can find it on the runner
          python -m ipykernel install --user --name=python3 --display-name=python3
          jupyter nbconvert --to notebook --execute notebooks/predictive_example.ipynb \
            --ExecutePreprocessor.timeout=120 \
            --ExecutePreprocessor.kernel_name=python3 \
            --output predictive_example-executed.ipynb \
            --output-dir=notebooks

      - name: Upload executed notebook
        uses: actions/upload-artifact@v4
        with:
          # include the python version from the matrix to avoid artifact name collisions
          name: executed-notebook-${{ matrix.python-version }}
          path: notebooks/predictive_example-executed.ipynb
